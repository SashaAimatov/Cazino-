<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cazino в гостях у Саши</title>
    <link rel="stylesheet" href="style.css">
    <!--Подлкючаем Telegram Web App SDK-->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <h1 id="app-title">Mini App</h1>
        <p class="counter-label">Ваш счет:</p>
        <div class="counter-display">
            <span id="counter-value">0</span>
        </div>
        <div class="button-group">
            <button id="increment-button" class="main-button">+1</button>
            <button id="reset-button" class="secondary-button">Сбросить</button>
        </div>
        <p id="user-info" class="user-info"></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
